<title>Restricted — Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--console:#0B0E13;--panel:#11161F;--panel-edge:#1E2630;--amber:#F2740B;--nogo:#E5484D;--go:#3FB950;--bone:#EDEAE3;--dim:#8B93A1;--faint:#535B68;--mono:'IBM Plex Mono',monospace;--sans:'Archivo',sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--console);color:var(--bone);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px}
  .gate{width:100%;max-width:420px;text-align:center}
  .gate svg{margin:0 auto 26px;display:block}
  .gate .ey{font-family:var(--mono);font-size:11px;letter-spacing:.24em;color:var(--amber);margin-bottom:14px}
  .gate h1{font-weight:850;font-variation-settings:'wdth' 112;font-size:30px;margin-bottom:10px}
  .gate p{color:var(--dim);font-size:15px;margin-bottom:30px}
  .gate input{width:100%;background:var(--panel);border:1px solid var(--panel-edge);border-radius:6px;color:var(--bone);font-family:var(--mono);font-size:15px;letter-spacing:.2em;padding:14px 16px;text-align:center;margin-bottom:14px}
  .gate input:focus{outline:none;border-color:var(--amber)}
  .gate button{width:100%;font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.1em;padding:14px;border-radius:6px;background:var(--amber);color:#0B0E13;border:none;cursor:pointer}
  .gate button:hover{background:#FF8A26}
  .msg{font-family:var(--mono);font-size:11.5px;letter-spacing:.14em;margin-top:16px;min-height:16px}
  .msg.err{color:var(--nogo)} .msg.ok{color:var(--go)}
</style>
</head>

  try{
    const raw = b64(PAYLOAD);
    const salt = raw.slice(0,16), iv = raw.slice(16,28), ct = raw.slice(28);
    const km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:300000, hash:'SHA-256'}, km, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);

    msg.className='msg ok'; msg.textContent='ACCESS GRANTED';
    const html = dec.decode(pt);

}
document.getElementById('go').addEventListener('click', () => unlock(document.getElementById('pw').value));
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(e.target.value); });
const cached = sessionStorage.getItem('mc-admin-key');
if (cached) unlock(cached, true);
